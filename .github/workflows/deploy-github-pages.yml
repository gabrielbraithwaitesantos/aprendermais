name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web:gh-pages

      - name: Add .nojekyll file
        run: touch dist/.nojekyll

      - name: Create 404.html for SPA routing
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Redirecting...</title>
            <script>
              // GitHub Pages 404 redirect for SPA
              var pathParts = window.location.pathname.split('/');
              var url = pathParts.slice(3).join('/');
              if (url.length && !url.endsWith('.html')) {
                url = '/#/' + url;
              }
              window.location.replace(window.location.protocol + '//' + window.location.host + '/aprendermais/' + url);
            </script>
          </head>
          <body>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: false
